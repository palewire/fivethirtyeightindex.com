name: Deploy thumbnail worker

on:
  push:
    branches: [main]
    paths:
      - 'workers/thumb-cache/**'
      - '.github/workflows/thumb-worker.yaml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: thumbnail-worker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/thumb-cache
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Deploy Worker
        run: npx --yes wrangler@4.94.0 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
